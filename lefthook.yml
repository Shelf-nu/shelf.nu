pre-commit:
  piped: true
  commands:
    prisma-generate:
      priority: 1
      glob: "packages/database/prisma/schema.prisma"
      run: pnpm db:generate
      skip:
        - merge
        - rebase

    eslint:
      priority: 2
      glob: "apps/webapp/**/*.{js,jsx,ts,tsx}"
      root: "apps/webapp/"
      run: >
        npx eslint
        --cache
        --cache-location ./node_modules/.cache/eslint
        --ext .js,.jsx,.ts,.tsx
        --fix
        {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase

    eslint-companion:
      priority: 2
      glob: "apps/companion/**/*.{js,jsx,ts,tsx}"
      root: "apps/companion/"
      run: "npx expo lint"
      skip:
        - merge
        - rebase

    prettier:
      priority: 3
      glob: "**/*.{ts,tsx,js,jsx,json,md,css,yaml,yml}"
      exclude: "pnpm-lock.yaml"
      run: >
        npx prettier
        --write
        --ignore-unknown
        {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase

    typecheck:
      priority: 4
      glob: "apps/webapp/**/*.{ts,tsx}"
      run: "cd apps/webapp && npx react-router typegen && npx tsc -b"
      skip:
        - merge
        - rebase

    # Advisory AI security review of staged changes via the
    # shelf-security-reviewer Claude subagent. Never blocks the commit by
    # default — see scripts/security-review-staged.sh for env-var toggles
    # (SHELF_SEC_REVIEW=0 to skip, SHELF_SEC_REVIEW_BLOCK=1 to enforce).
    security-review:
      priority: 5
      # Broad glob — the script narrows further to routes / *.server.ts /
      # prisma / package.json before invoking claude.
      glob: "**/*.{ts,tsx,prisma,sql,json}"
      run: ./scripts/security-review-staged.sh {staged_files}
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: >
        npx --no -- commitlint --edit {1} || {
          echo "";
          echo "Commit message doesn't follow Conventional Commits format";
          echo "";
          echo "Required format: type(scope?): description";
          echo "";
          echo "Examples:";
          echo "  feat: add user authentication";
          echo "  fix(api): resolve database connection issue";
          echo "  docs: update README with installation steps";
          echo "  chore: bump dependencies to latest versions";
          echo "";
          echo "Learn more: https://www.conventionalcommits.org";
          echo "";
          exit 1;
        }
