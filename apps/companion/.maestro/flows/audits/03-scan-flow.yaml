appId: com.shelf.companion.carlos
name: "Audits - Scan Flow"
tags:
  - audits

---
# Test: Audit scan flow
# Opens audit detail and starts the scanning process
# Note: Camera scanning doesn't work on simulator, but we verify the UI renders
# All steps are optional — audits may not exist on Personal workspace

- runFlow: ../../shared/login.yaml

# Use tapOn to force a11y tree refresh after runFlow
- tapOn:
    text: "Quick Actions"

# Navigate to Audits via Quick Action
- tapOn:
    text: "Audits"
    index: 0

# Use tapOn on page title for tree refresh
- tapOn:
    text: "Audits"

# Tap the first audit card (optional)
- tapOn:
    text: "Tap to scan"
    optional: true

# Tap "Start Scanning" button on detail view (optional)
- tapOn:
    text: "Start Scanning"
    optional: true

# Handle camera permission if needed
- tapOn:
    text: "Allow"
    optional: true

- takeScreenshot: audits-scan-flow
