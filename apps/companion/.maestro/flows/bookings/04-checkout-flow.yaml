appId: com.shelf.companion.carlos
name: "Bookings - Checkout Flow"
tags:
  - bookings

---
# Test: Booking checkout flow
# Navigates to Bookings and attempts to find a RESERVED booking for checkout
# Note: Requires a RESERVED booking to exist in test data — all steps are optional

- runFlow: ../../shared/login.yaml

# Use tapOn to force a11y tree refresh after runFlow
- tapOn:
    text: "Quick Actions"

# Navigate to Bookings via tab bar
- tapOn: "Bookings"

# Use tapOn on page title for tree refresh
- tapOn:
    text: "Bookings"

# Look for a booking with "Ready to check out" hint (optional — may not exist)
- tapOn:
    text: "Ready to check out"
    optional: true

# If found, verify checkout options
- takeScreenshot: bookings-checkout-flow
