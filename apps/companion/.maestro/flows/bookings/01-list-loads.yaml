appId: com.shelf.companion
name: "Bookings - List Loads"
tags:
  - bookings
  - smoke

---
# Test: Bookings list screen loads correctly
# Verifies filter pills and booking cards render

- runFlow: ../../shared/login.yaml

# Use tapOn to force a11y tree refresh after runFlow
- tapOn:
    text: "Quick Actions"

# Navigate to Bookings via tab bar
- tapOn: "Bookings"

# Use tapOn on page title for reliable tree refresh
- tapOn:
    text: "Bookings"

# Verify bookings screen filter pills (a11y: "Filter: {name}")
- assertVisible: "Filter: Active.*"
- assertVisible: "Filter: Completed"

- takeScreenshot: bookings-list-loaded
