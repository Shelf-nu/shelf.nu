appId: com.shelf.companion.carlos
name: "Bookings - Fulfil CTA names reserved units and extras separately"
tags:
  - bookings
  - models
  - high-impact
  - regression

---
# Regression coverage for the book-by-model fulfil follow-ups (PR #2734):
#
#   1. A booking that reserves model units (no concrete assets yet) shows the
#      reserved-unit count on its list card — "0 assets · N reserved" — not a
#      bare "0 assets" that contradicts the "Assign assets to check out" hint.
#
#   2. The fulfil-and-check-out CTA names the two halves of the scan list
#      separately: the units that satisfy the reservation and any extra scans
#      that ride along. Scanning 2 matching units then 1 unrelated asset shows
#      "Assign 2 · add 1 · check out", not "check out 3 units" (which hid that
#      the third was never reserved).
#
# PRECONDITION — run the fixture seeder first:
#   apps/companion/.maestro/scripts/seed-e2e.sh up
# It creates a RESERVED "E2E Fulfil Booking" reserving 2 units of a dedicated
# model, and writes the unit + outsider QR ids to env/e2e.env. Load both env
# files when running:
#   maestro test --env-file env/test.env --env-file env/e2e.env \
#     flows/bookings/14-fulfil-cta-names-extras.yaml
# (run-suite.sh loads env/test.env; pass e2e.env alongside.)
#
# Does NOT submit the checkout — it only asserts the labels, so the fixture
# stays reusable across runs. Tear down with `seed-e2e.sh down`.
#
# @see ../../../app/(tabs)/bookings/index.tsx   card reserved-count
# @see ../../../app/(tabs)/scanner.tsx          fulfilExtras / CTA

- runFlow: ../../shared/login.yaml

- tapOn: "Settings"
- extendedWaitUntil:
    visible: ".*Current workspace.*"
    timeout: 8000
- tapOn: ".*Current workspace.*"
- tapOn: ${SHELF_TEST_WORKSPACE}
- waitForAnimationToEnd

# ── Fix 1: the list card surfaces the reserved-unit count ──
- tapOn: "Bookings"
- scrollUntilVisible:
    element:
      text: ".*${SHELF_TEST_MODEL_BOOKING_NAME}, Reserved, 0 assets, 2 reserved.*"
    direction: DOWN
    timeout: 20000
- takeScreenshot: fulfil-card-reserved-count

# ── Open the booking and its fulfil scanner ──
- tapOn: ".*${SHELF_TEST_MODEL_BOOKING_NAME}, Reserved, 0 assets, 2 reserved.*"
- extendedWaitUntil:
    visible: ".*Scan to assign 2 reserved units and check out.*"
    timeout: 15000
- tapOn: ".*Scan to assign 2 reserved units and check out.*"
- extendedWaitUntil:
    visible: ".*0/2 assigned.*"
    timeout: 12000

# ── Scan the two reserved units -> 2/2, exact-match label ──
- tapOn: "Enter a code manually"
- waitForAnimationToEnd
- tapOn:
    id: "dev-scan-input"
- inputText: ${SHELF_TEST_MODEL_UNIT_QR_A}
- pressKey: Enter
- extendedWaitUntil:
    visible: ".*1/2 assigned.*"
    timeout: 10000
- tapOn:
    id: "dev-scan-input"
- inputText: ${SHELF_TEST_MODEL_UNIT_QR_B}
- pressKey: Enter
- extendedWaitUntil:
    visible: ".*2/2 assigned.*"
    timeout: 10000
- assertVisible: ".*Assign & check out 2 units.*"
- takeScreenshot: fulfil-cta-exact-match

# ── Fix 2: scan an unrelated asset -> extras named separately ──
- tapOn:
    id: "dev-scan-input"
- inputText: ${SHELF_TEST_MODEL_OUTSIDER_QR}
- pressKey: Enter
- extendedWaitUntil:
    visible: ".*Assign 2 · add 1 · check out.*"
    timeout: 10000
- takeScreenshot: fulfil-cta-names-extras
