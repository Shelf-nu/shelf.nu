appId: com.shelf.companion
name: "Auth - Forgot Password"
tags:
  - auth

---
# Test: Forgot password flow
# Verifies navigation to forgot-password and form submission

- runFlow: ../../shared/launch-to-login.yaml

# Navigate to forgot password screen
- tapOn:
    id: "forgot-password-link"
# Use tapOn to wait reliably for screen (extendedWaitUntil has stale-cache issue after runFlow)
- tapOn:
    text: "Forgot password?"
- assertVisible: "Forgot password?"

# Test empty submission
- tapOn:
    id: "send-reset-button"
- extendedWaitUntil:
    visible: "Please enter your email address."
    timeout: 3000
- takeScreenshot: auth-forgot-password-empty

# Enter email and submit
# Note: onSubmitEditing auto-submits (returnKeyType="go"), so make explicit tap optional
- tapOn:
    id: "forgot-email-input"
- inputText: ${SHELF_TEST_EMAIL}
- hideKeyboard
- tapOn:
    id: "send-reset-button"
    optional: true

# Wait for success state
- extendedWaitUntil:
    visible: "Check your email"
    timeout: 10000
- takeScreenshot: auth-forgot-password-success

# Navigate back to login
- tapOn:
    id: "back-to-signin-button"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 5000
