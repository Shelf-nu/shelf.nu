appId: com.shelf.companion.carlos
name: "Auth - Forgot Password"
tags:
  - auth

---
# Test: Forgot password flow
# Verifies navigation to forgot-password, form submission, and return to login

- runFlow: ../../shared/launch-to-login.yaml

# Navigate to forgot password screen
- tapOn:
    id: "forgot-password-link"

# Wait for forgot password screen to load
# autoFocus opens keyboard immediately — dismiss it first to see full screen
- extendedWaitUntil:
    visible:
      id: "forgot-email-input"
    timeout: 10000

# Tap title area to dismiss keyboard so we can see the full screen
- tapOn:
    text: "Forgot password?"
    optional: true
- takeScreenshot: auth-forgot-password-screen

# Enter email and submit
- tapOn:
    id: "forgot-email-input"
- inputText: ${SHELF_TEST_EMAIL}
- tapOn:
    id: "send-reset-button"
    optional: true

# Wait for success state
- extendedWaitUntil:
    visible: "Check your email"
    timeout: 10000
- takeScreenshot: auth-forgot-password-success

# Navigate back to login
- tapOn:
    id: "back-to-signin-button"
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 5000
