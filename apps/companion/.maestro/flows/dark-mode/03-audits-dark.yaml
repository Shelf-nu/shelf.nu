appId: com.shelf.companion.carlos
name: "Dark Mode - Audits Screen"
tags:
  - dark-mode
  - visual

---
# Test: Audits screen in dark mode
# Captures screenshots for visual regression review

- runFlow: ../../shared/login.yaml

# Use tapOn to force a11y tree refresh after runFlow
- tapOn:
    text: "Quick Actions"

# Switch to dark theme via Settings
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "APPEARANCE"
    timeout: 8000
- tapOn: "Theme: Dark"

# Navigate to Home first
- tapOn: "Home"

# Use tapOn for tree refresh on home
- tapOn:
    text: "Quick Actions"

# Navigate to Audits via Quick Action
- tapOn:
    text: "Audits"
    index: 0

# Use tapOn on page title for tree refresh
- tapOn:
    text: "Audits"

- takeScreenshot: dark-mode-audits-list
