appId: com.shelf.companion.carlos
name: "Scanner - Scan and Assign Custody"
tags:
  - scanner
  - custody
  - high-impact

---
# Test: Full scan → assign custody flow using dev scan injection
# Verifies the core user workflow: scan asset, see it in batch drawer

- runFlow: ../../shared/login.yaml
- tapOn:
    text: "Quick Actions"
- runFlow: ../../shared/switch-to-team-ws.yaml

# Navigate to Scanner tab
- tapOn: "Scan"
- tapOn:
    text: "Allow"
    optional: true

# Switch to Assign Custody mode (a11y: "Scanner action: Assign")
- tapOn: "Scanner action: Assign"

# Open dev scan input and inject QR
- tapOn:
    id: "dev-scan-toggle"
- tapOn:
    id: "dev-scan-input"
- inputText: ${SHELF_TEST_QR_ID}
- pressKey: enter

# Wait for item to appear in batch drawer
- extendedWaitUntil:
    visible: "1 asset scanned"
    timeout: 15000

- takeScreenshot: scanner-assign-custody-scanned

# Tap "Choose Custodian" to verify the action button works
- tapOn:
    text: "Choose Custodian"
    optional: true

- takeScreenshot: scanner-assign-custody-picker
