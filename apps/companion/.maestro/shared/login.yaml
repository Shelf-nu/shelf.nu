appId: com.shelf.companion.carlos
---
# Shared login flow — used as initFlow by every test
# Clears app state, launches, connects to dev server, and signs in
# User: nbonev@duck.com (Admin/Owner of Team WS)
#
# IMPORTANT: Run `xcrun simctl keychain booted reset` before this flow
# to clear SecureStore auth tokens (clearState only clears AsyncStorage).
#
# NOTE: The Shelf webapp must be running on localhost:3000 for API data
# to load. Auth works via Supabase directly (no webapp needed).

- clearState
- clearKeychain
- launchApp

# Dismiss any pending deep link alerts from previous test runs
- tapOn:
    text: "Cancel"
    optional: true

# Expo dev client launcher — tap the dev server to load the app
- assertVisible: "http://localhost:8081"
- tapOn: "http://localhost:8081"

# Wait for the JS bundle to load BEFORE dismissing overlays — on a freshly
# cleared Metro the first bundle takes ~10s+, and tapping "Continue" before
# the sheet exists is a no-op that leaves the sheet blocking the screen
# later. First launch shows the dev-menu welcome sheet ("Continue");
# subsequent launches go straight to the login screen ("Welcome back").
- extendedWaitUntil:
    visible: "Continue|Welcome back"
    timeout: 120000
- tapOn:
    text: "Continue"
    optional: true
# Swipe down to dismiss the dev tools bottom sheet if it opened
- swipe:
    direction: DOWN
    duration: 500

# Login screen ready
- extendedWaitUntil:
    visible:
      id: "email-input"
    timeout: 60000

# Enter email
- tapOn:
    id: "email-input"
- inputText: ${SHELF_TEST_EMAIL}

# Enter password — note: returnKeyType="go" may trigger auto-submit
- tapOn:
    id: "password-input"
- inputText: ${SHELF_TEST_PASSWORD}

# Dismiss keyboard by tapping on static text (hideKeyboard & back are unreliable on iOS)
- tapOn: "Welcome back"
# Sign in (optional — login may already fire via onSubmitEditing)
- tapOn:
    id: "sign-in-button"
    optional: true

# Dismiss the iOS "Save Password?" AutoFill prompt (appears on fresh
# simulators after clearKeychain; blocks visibility assertions if left up)
- tapOn:
    text: "Not Now"
    optional: true

# Wait for main app to load — tab bar text "Home" becomes visible
# This confirms auth succeeded and the main app rendered
- extendedWaitUntil:
    visible: "Home"
    timeout: 30000

# Navigate to Home tab and wait briefly for it to settle
- tapOn: "Home"
- waitForAnimationToEnd
