# Custom transcoding rule for isMemberOf.
#
# The image's bundled attribute-registry rule files (conf/attributes/eduPerson.xml,
# conf/attributes/inetOrgPerson.xml, etc.) cover mail/givenName/sn/eduPersonEntitlement/
# eduPersonScopedAffiliation, but NOT isMemberOf (it belongs to the separate eduMember
# schema, which isn't bundled). Without this rule the resolved isMemberOf attribute has
# no SAML encoder and would be silently dropped from the SAML2 assertion. This file is
# auto-loaded by the shibboleth.TranscodingRuleLoader configured in
# conf/attribute-registry.xml (it watches conf/attributes/custom/*.properties).
#
# OID per the eduMember schema (widely used by InCommon-affiliated IdPs).
id=isMemberOf
transcoder=SAML2StringTranscoder SAML1StringTranscoder
saml2.name=urn:oid:1.3.6.1.4.1.5923.1.5.1.1
# Do NOT emit xsi:type="xsd:string" on the AttributeValue. The default (true) adds
# the xsd type + an xmlns:xsd namespace, which forces exclusive-c14n InclusiveNamespaces
# handling that Go's goxmldsig (used by Supabase/crewjam) mis-canonicalizes, causing a
# signature digest mismatch ("SAML Assertion is not valid"). The bundled eduPerson rules
# suppress the type the same way; match them.
saml2.encodeType=false
saml1.name=urn:mace:dir:attribute-def:isMemberOf
displayName.en=Is Member Of
description.en=Group memberships of the principal
